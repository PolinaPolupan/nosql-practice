<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика вакансий на рынке труда</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 30px;
            color: #222;
        }

        h1 {
            margin-bottom: 25px;
            text-align: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 15px;
            margin-bottom: 10px;
            color: #555;
        }

        .card p {
            font-size: 26px;
            font-weight: bold;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .company {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .vacancy {
            margin-top: 10px;
            padding: 10px;
            background: #f1f3f6;
            border-radius: 8px;
        }

        .skills {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .skill {
            background: #dbeafe;
            color: #1e3a8a;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            margin-top: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Статистика вакансий на рынке труда</h1>

<div class="stats">
    <div class="card"><h2>Компаний</h2><p id="companies-count">0</p></div>
    <div class="card"><h2>Вакансий</h2><p id="vacancies-count">0</p></div>
    <div class="card"><h2>Соискателей</h2><p id="applicants-count">0</p></div>
</div>

<div class="charts">
    <div class="chart-box"><canvas id="salaryChart"></canvas></div>
    <div class="chart-box"><canvas id="expChart"></canvas></div>
    <div class="chart-box"><canvas id="industryChart"></canvas></div>
</div>

<div id="companies"></div>
<div class="loading" id="loading">Загрузка данных...</div>

<script>
const API = 'http://127.0.0.1:8000';

let salaryChart, expChart, industryChart;

function group(arr, step) {
    const map = {};
    arr.forEach(v => {
        const key = Math.floor(v / step) * step;
        map[key] = (map[key] || 0) + 1;
    });
    return map;
}

function updateChart(chart, ctx, type, labels, data) {

    const config = {
        type,
        data: {
            labels,
            datasets: [{
                data,
                backgroundColor: type === 'pie'
                    ? ['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa']
                    : '#3b82f6'
            }]
        },
        options: {
            responsive: true,
            animation: {
                duration: 800,
                easing: 'easeInOutQuart'
            }
        }
    };

    if (!chart) return new Chart(ctx, config);

    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.update();
    return chart;
}

async function loadData() {

    const companies = await (await fetch(`${API}/companies-with-vacancies`)).json();
    const vacancies = await (await fetch(`${API}/vacancies`)).json();
    const applicants = await (await fetch(`${API}/applicants`)).json();

    document.getElementById('companies-count').innerText = companies.length;
    document.getElementById('vacancies-count').innerText = vacancies.length;
    document.getElementById('applicants-count').innerText = applicants.length;

    const salaries = vacancies.map(v => v.salary);
    const salaryGroups = group(salaries, 1000);
    salaryChart = updateChart(salaryChart, document.getElementById('salaryChart'), 'bar', Object.keys(salaryGroups), Object.values(salaryGroups));

    const exp = applicants.map(a => a.experienceYears);
    const expGroups = group(exp, 2);
    expChart = updateChart(expChart, document.getElementById('expChart'), 'bar', Object.keys(expGroups), Object.values(expGroups));

    const industryMap = {};
    companies.forEach(c => {
        industryMap[c.industry] = (industryMap[c.industry] || 0) + 1;
    });

    industryChart = updateChart(industryChart, document.getElementById('industryChart'), 'pie', Object.keys(industryMap), Object.values(industryMap));

    const container = document.getElementById('companies');
    container.innerHTML = '';

    companies.forEach(c => {
        const div = document.createElement('div');
        div.className = 'company';

        let html = '';

        c.vacancies.forEach(v => {
            html += `
                <div class="vacancy">
                    <strong>${v.title}</strong><br>
                    Зарплата: ${v.salary}<br>
                    Уровень: ${v.level}
                </div>
            `;
        });

        div.innerHTML = `
            <h3>${c.name}</h3>
            <div>${c.country} • ${c.industry}</div>
            ${html}
        `;

        container.appendChild(div);
    });

    document.getElementById('loading').style.display = 'none';
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
